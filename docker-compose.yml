services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - sqlite_data:/app/data
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "file:/app/data/rrapp.db"
    command: sh -c "bun run db:push && bun run dev"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend

volumes:
  sqlite_data:
